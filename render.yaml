databases:
  - name: recipe-db
    databaseName: recipe
    user: recipe_user
    plan: free

services:
  - type: web
    name: recipe-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: DB_NAME
        fromDatabase:
          name: recipe-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: recipe-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: recipe-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: recipe-db
          property: host
